name: Maestro Mobile Testing

on:
    pull_request:
        branches: [ main, develop ]
    workflow_dispatch:

env:
    MAESTRO_VERSION: 1.35.0
    API_LEVEL: 33
    JAVA_VERSION: 17

jobs:
    android-tests:
        name: Android UI Tests
        runs-on: macos-latest  # macOSランナーはAndroidエミュレータのパフォーマンスが良い
        steps:
            -   name: Checkout code
                uses: actions/checkout@v3

            -   name: Set up JDK
                uses: actions/setup-java@v3
                with:
                    distribution: 'zulu'
                    java-version: '17'

            -   name: Setup Android SDK
                uses: android-actions/setup-android@v2

            -   name: Cache Gradle packages
                uses: actions/cache@v3
                with:
                    path: |
                        ~/.gradle/caches
                        ~/.gradle/wrapper
                    key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                    restore-keys: |
                        ${{ runner.os }}-gradle-

            -   name: Grant execute permission for gradlew
                run: chmod +x ./gradlew

            -   name: Build APK
                run: ./gradlew assembleDebug

            -   name: AVD cache
                uses: actions/cache@v3
                id: avd-cache
                with:
                    path: |
                        ~/.android/avd/*
                        ~/.android/adb*
                    key: avd-pixel9

            -   name: Create AVD and start emulator
                if: steps.avd-cache.outputs.cache-hit != 'true'
                uses: reactivecircus/android-emulator-runner@v2
                with:
                    api-level: 33
                    target: google_apis
                    arch: x86_64
                    profile: pixel_9
                    cores: 2
                    ram-size: 2048M
                    emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
                    disable-animations: true
                    script: echo "Emulator created."

            -   name: Install and run app on emulator
                uses: reactivecircus/android-emulator-runner@v2
                with:
                    api-level: 33
                    target: google_apis
                    arch: x86_64
                    profile: pixel_9
                    cores: 2
                    ram-size: 2048M
                    emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
                    disable-animations: true
                    script: |
                        adb devices
                        adb install app/build/outputs/apk/debug/app-debug.apk
                        echo "App installed successfully"
                        # アプリを起動する場合はコメントを外す
                        # adb shell am start -n YOUR_PACKAGE_NAME/YOUR_MAIN_ACTIVITY_NAME
                        # echo "App launched successfully"
