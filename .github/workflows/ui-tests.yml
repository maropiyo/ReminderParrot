name: UI Tests

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    android-ui-tests:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK
              uses: actions/setup-java@v4
              with:
                  distribution: 'zulu'
                  java-version: '17'

            - name: Setup Android SDK
              uses: android-actions/setup-android@v2

            - name: Install Maestro
              run: |
                  curl -Ls "https://get.maestro.mobile.dev" | bash
                  echo "$HOME/.maestro/bin" >> $GITHUB_PATH

            -   name: Create and start Android emulator
                run: |
                    # AVDマネージャーの更新
                    $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "system-images;android-30;google_apis;x86_64"
                    echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd --force --name test_avd --package "system-images;android-30;google_apis;x86_64" --device "Nexus 6"

                    # エミュレータの起動（バックグラウンドで）
                    nohup $ANDROID_HOME/emulator/emulator -avd test_avd -no-audio -no-window -no-boot-anim -gpu swiftshader_indirect &

                    # エミュレータが起動するまで待機
                    $ANDROID_HOME/platform-tools/adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
                    echo "Emulator is ready"

            - name: Build Android Debug APK
              run: ./gradlew assembleDebug

            -   name: Install APK on emulator
                run: |
                    $ANDROID_HOME/platform-tools/adb install -r androidApp/build/outputs/apk/debug/app-debug.apk

            - name: Run Maestro tests
              run: |
                  maestro test .maestro/flows/ --config .maestro/config.yaml

            - name: Upload test results
              uses: actions/upload-artifact@v2
              with:
                  name: android-test-results
                  path: |
                        ./test-results
                        ./screenshots

    ios-ui-tests:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v3

            - name: Set up Xcode
              uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: 'latest-stable'

            - name: Install Maestro
              run: |
                  curl -Ls "https://get.maestro.mobile.dev" | bash
                  echo "$HOME/.maestro/bin" >> $GITHUB_PATH

            - name: Install Cocoapods
              run: |
                  gem install cocoapods
                  pod install --project-directory=iosApp

            - name: Build iOS app
              run: |
                  xcodebuild -workspace iosApp/Reminco.xcworkspace -scheme "Reminco" -configuration Debug -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 14,OS=latest' build

            - name: Run Maestro tests
              run: |
                  maestro test .maestro/flows/ --config .maestro/config.yaml --platform ios

            - name: Upload test results
              uses: actions/upload-artifact@v4
              with:
                  name: ios-test-results
                  path: |
                      maestro-test-results.xml
                      .maestro/screenshots/
