name: UI Tests

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    android-ui-tests:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v3

            - name: Set up JDK
              uses: actions/setup-java@v3
              with:
                  distribution: 'zulu'
                  java-version: '17'

            - name: Setup Android SDK
              uses: android-actions/setup-android@v2

            - name: Install Maestro
              run: |
                  curl -Ls "https://get.maestro.mobile.dev" | bash
                  echo "$HOME/.maestro/bin" >> $GITHUB_PATH

            - name: Build Android Debug APK
              run: ./gradlew assembleDebug

            - name: Run Maestro tests
              run: |
                  maestro test .maestro/flows/ --config .maestro/config.yaml

            - name: Upload test results
              uses: actions/upload-artifact@v4
              with:
                  name: android-test-results
                  path: |
                      maestro-test-results.xml
                      .maestro/screenshots/

    ios-ui-tests:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v3

            - name: Set up Xcode
              uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: 'latest-stable'

            - name: Install Maestro
              run: |
                  curl -Ls "https://get.maestro.mobile.dev" | bash
                  echo "$HOME/.maestro/bin" >> $GITHUB_PATH

            - name: Install Cocoapods
              run: |
                  gem install cocoapods
                  pod install --project-directory=iosApp

            - name: Build iOS app
              run: |
                  xcodebuild -workspace iosApp/Reminco.xcworkspace -scheme "Reminco" -configuration Debug -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 14,OS=latest' build

            - name: Run Maestro tests
              run: |
                  maestro test .maestro/flows/ --config .maestro/config.yaml --platform ios

            - name: Upload test results
              uses: actions/upload-artifact@v4
              with:
                  name: ios-test-results
                  path: |
                      maestro-test-results.xml
                      .maestro/screenshots/
