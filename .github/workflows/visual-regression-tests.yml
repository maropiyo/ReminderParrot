name: Visual Regression Tests

on:
    pull_request:
        branches: [ main ]

jobs:
    vrt:
        runs-on: ubuntu-latest
        needs: [android-ui-tests, ios-ui-tests]
        steps:
            - uses: actions/checkout@v3

            - name: Download baseline screenshots
              uses: actions/download-artifact@v3
              with:
                  name: baseline-screenshots
                  path: baseline

            - name: Download new screenshots
              uses: actions/download-artifact@v3
              with:
                  name: android-test-results
                  path: current/android

            - name: Download new screenshots (iOS)
              uses: actions/download-artifact@v3
              with:
                  name: ios-test-results
                  path: current/ios

            - name: Install dependencies
              run: npm install -g resemblejs

            - name: Compare screenshots
              run: |
                  # スクリプトでスクリーンショットを比較
                  node .github/scripts/compare-screenshots.js

            - name: Upload comparison results
              uses: actions/upload-artifact@v4
              with:
                  name: vrt-results
                  path: comparison-results

            - name: Comment PR with test results
              uses: actions/github-script@v6
              if: github.event_name == 'pull_request'
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const fs = require('fs');

                      // VRTテスト結果の読み込み
                      let resultContent = '';
                      if (fs.existsSync('comparison-results')) {
                        const diffFiles = fs.readdirSync('comparison-results')
                          .filter(file => file.endsWith('_diff.png'));

                        if (diffFiles.length > 0) {
                          resultContent += '## 🔍 視覚的な差分が検出されました\n\n';
                          diffFiles.forEach(file => {
                            resultContent += `- ${file.replace('_diff.png', '')}\n`;
                          });
                        } else {
                          resultContent += '## ✅ 視覚的な差分はありません\n\n';
                        }
                      }

                      // PRコメントとして投稿
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: resultContent
                      });
